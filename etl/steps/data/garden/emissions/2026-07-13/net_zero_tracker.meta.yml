definitions:
  common:
    description_key:
      - |-
        A country's net-zero status reflects the most firmly established form its commitment has taken. From strongest to weakest, the possible statuses are: achieved (externally validated), achieved (self-declared), in law, in policy document, declaration or pledge, and proposed or in discussion. Countries assessed as having no net-zero target are shown as "No target".
      - The inclusion criteria for net-zero commitments may vary from country to country. For example, the inclusion of international aviation emissions, or the acceptance of carbon offsets.
    description_from_producer: "More detail about each indicator is available in [the Tracker Codebook](https://docs.google.com/document/d/13bGE8FCOeF5QweoOvyMPZi3XbZrGLEPL2aM04LuZQcc/edit?usp=sharing)."
    presentation:
      topic_tags:
        - CO2 & Greenhouse Gas Emissions
      attribution_short: Net Zero Tracker
    unit: ""
    short_unit: ""

dataset:
  update_period_days: 365
  owners:
    - Pablo Rosado

tables:
  net_zero_tracker:
    variables:
      net_zero_status:
        title: Status of net-zero carbon emissions targets
        description_short: |-
          The status of each country's commitment to 'net-zero' emissions. The specifics of this commitment can vary, with some countries pledging to reach net-zero greenhouse gas emissions, while others define this as carbon emissions only. Countries assessed as having no net-zero target are shown as "No target".
        processing_level: minor
        # Order the legend from least to most firmly established commitment. Only categories present in
        # the data are listed; listing an absent one (e.g. "Achieved (externally validated)") would add
        # an empty phantom entry to the legend.
        type: ordinal
        sort:
          - "No target"
          - "Proposed / in discussion"
          - "Declaration / pledge"
          - "In policy document"
          - "In law"
          - "Achieved (self-declared)"
      has_net_zero_target:
        title: Countries that have set a net-zero emissions target
        description_short: |-
          Countries have a net-zero emissions target if they: have achieved net-zero already; have a target written in law; have it in their policy document; or have made a public pledge. Countries assessed as having no target are shown as "No target".
        processing_level: major
        type: ordinal
        sort:
          - "No target"
          - "Net-zero achieved or pledged"
        description_processing: |-
          A country is labelled as having a net-zero target if it appears in the Net Zero Tracker with a target that has a defined status and target year. Countries the tracker assessed as having no target are labelled "No target". Countries the tracker does not cover are left blank (shown as missing on charts), so that "no target" is distinguishable from "no data".
