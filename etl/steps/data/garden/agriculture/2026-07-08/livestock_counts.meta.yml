definitions:
  common:
    processing_level: major
    unit: animals
    short_unit: ""
    display:
      numDecimalPlaces: 0
    presentation:
      topic_tags:
        - Meat & Dairy Production
  # Only the eight mammal species that are spliced with HYDE carry this; the FAOSTAT-only species
  # (birds, camels, rabbits, etc.) are taken directly from FAOSTAT and do not.
  description_processing_hyde: &description_processing_hyde |-
    - We combine data from the UN Food and Agriculture Organization (FAOSTAT), available from 1961 onwards, with long-run historical estimates from HYDE for the period 1890 to 1950.
    - HYDE reports figures for its own set of world sub-regions, which we aggregate into continents and a world total.
    - HYDE reports counts in thousands of animals, which we convert to the number of animals.

dataset:
  title: Livestock counts
  update_period_days: 365
  owners:
    - Pablo Rosado

